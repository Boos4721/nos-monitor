name: Rust CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-amd64
            binary_ext: ""
            run_tests: true
          - os: windows-latest
            artifact: windows-amd64
            binary_ext: ".exe"
            run_tests: false
          - os: macos-13
            artifact: macos-amd64
            binary_ext: ""
            run_tests: false
          - os: macos-14
            artifact: macos-arm64
            binary_ext: ""
            run_tests: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

      - name: Test
        if: ${{ matrix.run_tests }}
        run: cargo test --all-targets --all-features

      - name: Build release
        run: cargo build --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: nos-monitor-${{ matrix.artifact }}
          path: target/release/nos-monitor${{ matrix.binary_ext }}
          if-no-files-found: error

